  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "11:00"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-minor-days: 14
      semver-major-days: 30

