steps:
  - name: "gcr.io/cloud-builders/docker"
    id: start_testdb
    entrypoint: /bin/sh
    args:
      [
        "-c",
        "docker run --net cloudbuild --name testdb -e ARANGO_NO_AUTH=1 -d -p 127.0.0.1:8529:8529 arangodb/arangodb:3.12.1",
      ]

  - name: mikewilliamson/wait-for
    id: wait_testdb
    args: ["testdb:8529"]

  - name: "gcr.io/cloud-builders/docker"
    id: build-ci-image
    dir: services/summaries
    args: ["build", "--target=ci", "-t", "ci-image", "."]

  - name: "gcr.io/cloud-builders/docker"
    id: test-results
    dir: services/summaries
    entrypoint: /bin/sh
    args:
      - "-c"
      - |
        docker run --net cloudbuild \
          -e DB_URL=http://testdb:8529 \
          -e DB_USER=root \
          -e DB_PASSWORD=test \
          ci-image python3 -m pytest -v

  - name: "gcr.io/cloud-builders/docker"
    id: generate-image-name
    entrypoint: "bash"
    dir: services/summaries
    args:
      - "-c"
      - |
        echo "northamerica-northeast1-docker.pkg.dev/track-compliance/tracker/services/summaries:$(echo $BRANCH_NAME | sed 's/[^a-zA-Z0-9]/-/g')-$SHORT_SHA-$(date +%s)" > /workspace/imagename

  - name: "gcr.io/cloud-builders/docker"
    id: build-results
    entrypoint: "bash"
    dir: services/summaries
    args:
      - "-c"
      - |
        image=$(cat /workspace/imagename)
        docker build -t $image .

  - name: "gcr.io/cloud-builders/docker"
    id: push-results-if-master
    entrypoint: "bash"
    dir: services/summaries
    args:
      - "-c"
      - |
        if [[ "$BRANCH_NAME" == "master" ]]
        then
          image=$(cat /workspace/imagename)
          docker push $image
        else
          exit 0
        fi
