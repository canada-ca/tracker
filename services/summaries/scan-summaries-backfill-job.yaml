apiVersion: batch/v1
kind: Job
metadata:
  name: scan-summaries-backfill-job-shadow
  namespace: scanners
spec:
  template:
    spec:
      containers:
        - name: scan-summaries-backfill
          image: northamerica-northeast1-docker.pkg.dev/track-compliance/tracker/services/summaries:master-edc2b4f-1784646709 # {"$imagepolicy": "flux-system:summaries"}
          command: ["python3", "scan_summaries.py"]
          args: ["--target", "shadow"]
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: scanners
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: scanners
                  key: DB_PASS
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: scanners
                  key: DB_URL
            - name: DB_PORT
              value: "8529"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: scanners
                  key: DB_NAME
      restartPolicy: Never
  backoffLimit: 4
