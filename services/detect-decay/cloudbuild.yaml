steps:
  - name: 'docker:29'
    id: start_testdb
    entrypoint: 'ash'
    args:
      [
        '-c',
        'docker run --net cloudbuild --name arangodb -e ARANGO_NO_AUTH=1 -d -p 127.0.0.1:8529:8529 arangodb/arangodb:3.12.1',
      ]

  - name: mikewilliamson/wait-for
    id: wait_testdb
    args: ['arangodb:8529']

  - name: 'docker:29'
    id: build-test-image
    dir: services/detect-decay
    args: ['build', '--target=test', '-t', 'test-image', '.']

  - name: 'docker:29'
    id: run-tests
    dir: services/detect-decay
    entrypoint: 'ash'
    args:
      - '-c'
      - |
        docker run --net cloudbuild \
          -e DB_URL=http://arangodb:8529 \
          -e DB_USER=root \
          -e DB_PASS=test \
          -e DB_NAME=track_dmarc \
          -e DETECT_DECAY_START_HOUR=$_DETECT_DECAY_START_HOUR \
          -e DETECT_DECAY_START_MINUTE=$_DETECT_DECAY_START_MINUTE \
          -e DETECT_DECAY_MINIMUM_SCANS=$_DETECT_DECAY_MINIMUM_SCANS \
          -e NOTIFICATION_API_KEY=$_NOTIFICATION_API_KEY \
          -e NOTIFICATION_API_URL=$_NOTIFICATION_API_URL \
          -e DETECT_DECAY_EMAIL_TEMPLATE_ID=$_DETECT_DECAY_EMAIL_TEMPLATE_ID \
          test-image python3 -m pytest

  - name: 'docker:29'
    id: generate-image-name
    entrypoint: 'ash'
    dir: services/detect-decay
    args:
      - '-c'
      - |
        echo 'northamerica-northeast1-docker.pkg.dev/track-compliance/tracker/services/detect-decay:'"$(echo $BRANCH_NAME | sed 's/[^a-zA-Z0-9]/-/g')-$SHORT_SHA-$(date +%s)" > /workspace/imagename

  - name: 'docker:29'
    id: build-production-image
    entrypoint: 'ash'
    dir: services/detect-decay
    args:
      - '-c'
      - |
        image=$(cat /workspace/imagename)
        docker build -t $image .

  - name: 'docker:29'
    id: push-results-if-master
    entrypoint: 'ash'
    dir: services/detect-decay
    args:
      - '-c'
      - |
        if [[ '$BRANCH_NAME' == 'master' ]]
        then
          image=$(cat /workspace/imagename)
          docker push $image
        else
          exit 0
        fi
